<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 36'%3E%3Cpath d='M16 1 29 6v10c0 9-5 15-13 18C8 31 3 25 3 16V6Z' fill='%2306111f' stroke='%2320c7f7' stroke-width='2'/%3E%3Cpath d='m10 18 4 4 8-10' fill='none' stroke='%2320c7f7' stroke-width='2'/%3E%3C/svg%3E">
  <title>PersistGuard 安全审计报告</title>
  <style>
    :root{--bg:#06111f;--bg2:#091929;--panel:#0d2033;--panel2:#10273d;--line:#26435e;--line2:#345977;--text:#f2f7fb;--muted:#91a8bb;--cyan:#20c7f7;--cyan2:#149dd3;--high:#ff4d5e;--medium:#ffad27;--low:#42d978;--shadow:0 18px 42px rgba(0,0,0,.3);--r:10px}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 70% -20%,#123957 0,transparent 36%),linear-gradient(135deg,var(--bg),#071522 58%,#07101b);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh}button,input,select{font:inherit}button,select{color:var(--text)}button{cursor:pointer}.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}.appbar{height:72px;display:flex;align-items:center;gap:28px;padding:0 24px;border-bottom:1px solid var(--line);background:rgba(4,14,26,.92);backdrop-filter:blur(18px);position:sticky;top:0;z-index:20}.brand{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:750;white-space:nowrap}.brand-mark{width:34px;height:40px;display:grid;place-items:center;color:var(--cyan)}.brand-mark svg{width:34px;height:40px}.brand small{font-size:12px;color:var(--muted);font-weight:500;margin-left:5px}.meta{display:flex;align-items:center;gap:30px;margin-left:auto;color:var(--muted)}.meta div{display:grid;gap:2px}.meta strong{color:var(--text);font-size:13px;font-weight:650}.top-actions{display:flex;gap:8px}.btn{border:1px solid var(--line2);background:#0b1c2c;padding:9px 14px;border-radius:7px;transition:.18s ease}.btn:hover,.btn:focus-visible{border-color:var(--cyan);background:#102a41;outline:none}.btn.primary{background:var(--cyan);color:#03111d;border-color:var(--cyan);font-weight:750}.layout{display:grid;grid-template-columns:minmax(720px,1fr) 430px;max-width:1900px;margin:auto;min-height:calc(100vh - 72px)}.main{min-width:0;padding:22px 24px 38px;border-right:1px solid var(--line)}.detail{padding:18px;background:rgba(8,24,39,.86);position:sticky;top:72px;height:calc(100vh - 72px);overflow:auto}.section-title{font-size:15px;margin:0 0 14px;font-weight:750;letter-spacing:.02em}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.metric{padding:14px 16px;border:1px solid var(--line);border-top-width:2px;background:linear-gradient(135deg,var(--panel),rgba(13,32,51,.62));border-radius:var(--r);min-height:90px}.metric.high{border-top-color:var(--high)}.metric.medium{border-top-color:var(--medium)}.metric.low{border-top-color:var(--low)}.metric.total{border-top-color:var(--cyan)}.metric span{color:var(--muted);font-size:12px}.metric strong{display:block;font-size:30px;line-height:1;margin-top:12px}.metric.high strong{color:var(--high)}.metric.medium strong{color:var(--medium)}.metric.low strong{color:var(--low)}.metric.total strong{color:var(--cyan)}.analytics{display:grid;grid-template-columns:320px 1fr;gap:22px;padding:18px;border:1px solid var(--line);background:rgba(11,28,44,.82);border-radius:var(--r);margin-bottom:16px}.donut-wrap{display:flex;gap:22px;align-items:center}.donut{--highP:0;--medP:0;width:150px;aspect-ratio:1;border-radius:50%;background:conic-gradient(var(--high) 0 calc(var(--highP)*1%),var(--medium) calc(var(--highP)*1%) calc((var(--highP) + var(--medP))*1%),var(--low) 0);display:grid;place-items:center;position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.28)}.donut:after{content:"";position:absolute;width:102px;aspect-ratio:1;border-radius:50%;background:#091a2b;border:1px solid var(--line)}.donut-center{z-index:1;text-align:center}.donut-center strong{display:block;font-size:30px}.donut-center small{color:var(--muted)}.legend{display:grid;gap:10px}.legend div{display:grid;grid-template-columns:10px 1fr auto;gap:8px;align-items:center;color:var(--muted);font-size:12px}.dot{width:8px;height:8px;border-radius:50%}.coverage{border-left:1px solid var(--line);padding-left:22px;max-height:218px;overflow:auto}.coverage-row{display:grid;grid-template-columns:minmax(145px,1fr) 120px 42px;gap:10px;align-items:center;margin:9px 0;color:var(--muted);font-size:12px}.coverage-row span:first-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar{height:5px;background:#1b354d;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan2),var(--cyan));border-radius:inherit}.count{color:var(--cyan);text-align:right}.toolbar{display:grid;grid-template-columns:minmax(220px,1fr) 145px 180px auto;gap:10px;margin-bottom:10px}.search{position:relative}.search input{width:100%;height:40px;background:#0a1b2b;border:1px solid var(--line);border-radius:7px;color:var(--text);padding:0 12px 0 38px;outline:none}.search input:focus{border-color:var(--cyan)}.search svg{position:absolute;left:12px;top:12px;width:16px;color:var(--muted)}select{height:40px;background:#0a1b2b;border:1px solid var(--line);border-radius:7px;padding:0 11px;outline:none}.toggle{height:40px;display:flex;align-items:center;gap:8px;color:var(--muted);white-space:nowrap}.toggle input{accent-color:var(--cyan);width:17px;height:17px}.table-shell{width:100%;max-width:100%;border:1px solid var(--line);border-radius:var(--r);overflow:auto;background:rgba(9,25,41,.75);min-height:340px}.findings{width:100%;border-collapse:collapse;min-width:800px}.findings th{position:sticky;top:0;background:#10263a;text-align:left;padding:10px 12px;color:#b7c8d7;font-size:11px;letter-spacing:.04em;border-bottom:1px solid var(--line2);z-index:2}.findings td{padding:11px 12px;border-bottom:1px solid #1c3851;color:#b9c8d5;vertical-align:middle}.findings tr{transition:.15s ease}.findings tbody tr:hover,.findings tbody tr.selected{background:#102b43}.findings tbody tr.selected{box-shadow:inset 3px 0 var(--cyan)}.sev{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:750}.sev:before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 10px currentColor}.sev.HIGH{color:var(--high)}.sev.MEDIUM{color:var(--medium)}.sev.LOW{color:var(--low)}.score{font-weight:800}.score.HIGH{color:var(--high)}.score.MEDIUM{color:var(--medium)}.score.LOW{color:var(--low)}.path{max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#a9bed0}.empty{display:none;padding:60px 20px;text-align:center;color:var(--muted)}.table-footer{display:flex;justify-content:space-between;gap:20px;color:var(--muted);font-size:12px;padding-top:10px}.detail-head{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--line)}.detail-head h2{font-size:16px;margin:0}.close{display:none;background:none;border:0;color:var(--muted);font-size:23px}.risk-hero{display:grid;grid-template-columns:1fr 92px;gap:14px;padding:18px 4px}.risk-hero h3{font-size:19px;margin:0 0 6px;word-break:break-word}.risk-hero p{margin:3px 0;color:var(--muted)}.risk-score{display:grid;place-items:center;background:linear-gradient(145deg,#7c1520,#d32d3e);border:1px solid #ff6473;border-radius:8px;font-size:31px;font-weight:850}.risk-score small{display:block;font-size:10px;font-weight:600}.detail-section{border:1px solid var(--line);border-radius:8px;background:rgba(14,34,53,.82);padding:13px;margin-bottom:10px}.detail-section h4{font-size:13px;margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line);color:#dce8f0}.kv{display:grid;grid-template-columns:82px 1fr;gap:6px 9px;font-size:12px}.kv dt{color:var(--muted)}.kv dd{margin:0;word-break:break-all}.rules{display:grid;gap:5px}.rule{display:grid;grid-template-columns:40px 1fr 42px;gap:8px;padding:8px;background:#0b1c2c;border-radius:5px;font-size:12px}.rule strong:last-child{text-align:right}.rule.positive strong:last-child{color:var(--high)}.rule.negative strong:last-child{color:var(--low)}.rule small{display:block;color:var(--muted);margin-top:2px}.advice{margin:0;padding-left:19px;color:#bccbd8;font-size:12px}.advice li+li{margin-top:7px}.raw{white-space:pre-wrap;word-break:break-all;max-height:160px;overflow:auto;background:#071727;padding:9px;border-radius:5px;color:#9fb6c8;font-size:11px}.footer-note{padding:15px 0 0;color:var(--muted);font-size:11px}.errors{margin-top:16px;border:1px solid #624831;background:#2a2017;padding:12px;border-radius:8px;color:#e7c39b}.errors summary{cursor:pointer;font-weight:700}.mobile-detail-btn{display:none;position:fixed;right:18px;bottom:18px;border:0;border-radius:99px;background:var(--cyan);color:#04131f;padding:12px 18px;font-weight:800;z-index:25;box-shadow:var(--shadow)}
    .findings tbody tr:focus-visible{outline:2px solid var(--cyan);outline-offset:-2px}.visually-hidden{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}@media(max-width:1180px){.layout{grid-template-columns:1fr}.main{border-right:0}.detail{display:none;position:fixed;inset:72px 0 0 24%;height:auto;z-index:30;box-shadow:var(--shadow);border-left:1px solid var(--line)}.detail.open{display:block}.close,.mobile-detail-btn{display:block}.meta{display:none}}
    @media(max-width:760px){.appbar{height:62px;padding:0 14px}.brand small{display:none}.layout{min-width:0}.main{padding:16px 12px 90px}.summary{grid-template-columns:repeat(2,1fr)}.analytics{grid-template-columns:1fr}.coverage{border:0;border-top:1px solid var(--line);padding:16px 0 0}.toolbar{grid-template-columns:1fr 1fr}.search{grid-column:1/-1}.toggle{justify-content:flex-start}.detail{inset:62px 0 0 0}.top-actions .btn:not(.primary){display:none}.donut-wrap{justify-content:center}.table-footer{display:block}.metric{min-height:80px}.metric strong{font-size:25px}}
    @media print{body{background:#fff;color:#111}.appbar,.toolbar,.top-actions,.mobile-detail-btn,.close{display:none!important}.layout{display:block}.main{border:0;padding:0}.detail{display:block;position:static;height:auto;background:#fff;color:#111}.metric,.analytics,.table-shell,.detail-section{background:#fff;border-color:#aaa}.findings th{position:static;background:#eee;color:#111}.findings td,.risk-hero p,.kv dt,.footer-note{color:#333}.table-shell{min-height:0}.findings{min-width:0;font-size:10px}}
  </style>
</head>
<body>
  <header class="appbar">
    <div class="brand"><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 36 42" fill="none"><path d="M18 2 32 7v11c0 10-5.7 17.6-14 21C9.7 35.6 4 28 4 18V7L18 2Z" stroke="currentColor" stroke-width="2"/><path d="m12 21 4 4 8-10" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>PersistGuard <small>macOS 持久化自启动项安全审计</small></span></div>
    <div class="meta"><div>扫描时间<strong id="scanTime">-</strong></div><div>主机名<strong id="hostName">-</strong></div><div>扫描时长<strong id="duration">-</strong></div><div>数据源<strong id="coverageMeta">-</strong></div></div>
    <div class="top-actions"><button class="btn" id="printBtn">打印</button><button class="btn" id="jsonBtn">JSON</button><button class="btn primary" id="csvBtn">导出 CSV</button></div>
  </header>
  <div class="layout">
    <main class="main">
      <h1 class="section-title">风险概览</h1>
      <section class="summary" aria-label="风险摘要">
        <article class="metric high"><span>高危 HIGH</span><strong id="highCount">0</strong></article>
        <article class="metric medium"><span>中危 MEDIUM</span><strong id="mediumCount">0</strong></article>
        <article class="metric low"><span>低危 LOW</span><strong id="lowCount">0</strong></article>
        <article class="metric total"><span>扫描总数</span><strong id="totalCount">0</strong></article>
      </section>
      <section class="analytics">
        <div><h2 class="section-title">风险分布</h2><div class="donut-wrap"><div class="donut" id="donut"><div class="donut-center"><strong id="donutTotal">0</strong><small>项目总数</small></div></div><div class="legend" id="legend"></div></div></div>
        <div class="coverage"><h2 class="section-title">来源覆盖</h2><div id="coverage"></div></div>
      </section>
      <section class="toolbar" aria-label="发现筛选器">
        <label class="search"><span class="visually-hidden">搜索发现</span><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m16 16 5 5" stroke="currentColor" stroke-width="2"/></svg><input id="search" type="search" aria-label="搜索发现" placeholder="搜索项名称、路径、规则或签名…"></label>
        <select id="levelFilter" aria-label="风险等级"><option value="">严重性：全部</option><option>HIGH</option><option>MEDIUM</option><option>LOW</option></select>
        <select id="sourceFilter" aria-label="来源"><option value="">来源：全部</option></select>
        <label class="toggle"><input id="riskyOnly" type="checkbox"> 仅显示风险项</label>
      </section>
      <div class="table-shell"><table class="findings"><thead><tr><th>严重性</th><th>项目名</th><th>来源</th><th>程序路径</th><th>得分</th><th>签名</th></tr></thead><tbody id="findingsBody"></tbody></table><div class="empty" id="empty">没有符合当前筛选条件的项目。</div></div>
      <div class="table-footer"><span id="visibleCount" aria-live="polite">显示 0 项</span><span id="thresholdNote">风险分值为规则权重之和，并截断到 0–100。</span></div>
      <details class="errors" id="errorBox"><summary id="errorSummary">扫描提示</summary><div id="errors"></div></details>
    </main>
    <aside class="detail" id="detail" aria-label="发现详情"><div class="detail-head"><h2>详细信息</h2><button class="close" id="closeDetail" aria-label="关闭详情">×</button></div><div id="detailContent"></div></aside>
  </div>
  <button class="mobile-detail-btn" id="openDetail">查看所选项</button>
  <script id="scan-data" type="application/json">__SCAN_DATA__</script>
  <script>
  (()=>{"use strict";
    const data=JSON.parse(document.getElementById("scan-data").textContent), items=data.items||[], summary=data.summary||{};
    const $=id=>document.getElementById(id), sourceNames={launch_agent:"LaunchAgent",launch_daemon:"LaunchDaemon",system_launch_agent:"系统 LaunchAgent",system_launch_daemon:"系统 LaunchDaemon",cron:"cron",periodic:"periodic",shell_rc:"Shell 启动脚本",login_item:"登录项",background_item:"后台项 BTM",login_hook:"登录/注销钩子",configuration_profile:"描述文件"};
    let selectedId=items[0]?.id||"";
    $("scanTime").textContent=(data.metadata?.finished_at||"-").replace("T"," ").slice(0,19);$("hostName").textContent=data.metadata?.host||"-";$("duration").textContent=`${data.metadata?.duration_seconds??0}s`;$("coverageMeta").textContent=`${(data.coverage||[]).filter(x=>x.attempted).length} 类`;$("thresholdNote").textContent=`风险分值为规则权重之和并截断到 0–100；高危 ≥ ${data.policy?.high_threshold??60}，中危 ${data.policy?.medium_threshold??30}–${(data.policy?.high_threshold??60)-1}。`;
    for(const level of ["HIGH","MEDIUM","LOW"]){$(level.toLowerCase()+"Count").textContent=summary[level]||0}$("totalCount").textContent=summary.TOTAL||0;$("donutTotal").textContent=summary.TOTAL||0;
    const total=Math.max(summary.TOTAL||0,1), hp=(summary.HIGH||0)/total*100, mp=(summary.MEDIUM||0)/total*100;$("donut").style.setProperty("--highP",hp);$("donut").style.setProperty("--medP",mp);
    $("legend").innerHTML=[["HIGH","高危","var(--high)"],["MEDIUM","中危","var(--medium)"],["LOW","低危","var(--low)"]].map(([k,n,c])=>`<div><i class="dot" style="background:${c}"></i><span>${n}</span><strong>${summary[k]||0} (${(((summary[k]||0)/total)*100).toFixed(1)}%)</strong></div>`).join("");
    const maxCoverage=Math.max(...(data.coverage||[]).map(x=>x.item_count||0),1);$("coverage").innerHTML=(data.coverage||[]).map(x=>`<div class="coverage-row" title="${escapeHtml(x.note||"")}"><span>${escapeHtml(x.display_name)}</span><i class="bar"><i style="width:${Math.max((x.item_count||0)/maxCoverage*100,x.item_count?4:0)}%"></i></i><span class="count">${x.item_count}${x.error_count?` / !${x.error_count}`:""}</span></div>`).join("")||"<p class='footer-note'>无覆盖信息</p>";
    [...new Set(items.map(x=>x.source))].sort().forEach(source=>{const o=document.createElement("option");o.value=source;o.textContent=`来源：${sourceNames[source]||source}`;$("sourceFilter").appendChild(o)});
    function escapeHtml(value){return String(value??"").replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
    function filterItems(){const q=$("search").value.trim().toLowerCase(),level=$("levelFilter").value,source=$("sourceFilter").value,risky=$("riskyOnly").checked;return items.filter(item=>(!level||item.level===level)&&(!source||item.source===source)&&(!risky||item.score>0)&&(!q||JSON.stringify(item).toLowerCase().includes(q)))}
    function renderTable(){const rows=filterItems();$("findingsBody").innerHTML=rows.map(item=>`<tr data-id="${escapeHtml(item.id)}" class="${item.id===selectedId?"selected":""}" tabindex="0"><td><span class="sev ${item.level}">${item.level}</span></td><td>${escapeHtml(item.label||"(未命名)")}</td><td>${escapeHtml(sourceNames[item.source]||item.source)}</td><td class="path mono" title="${escapeHtml(item.program||item.config_path)}">${escapeHtml(item.program||item.config_path||"—")}</td><td><span class="score ${item.level}">${item.score}</span></td><td>${escapeHtml(item.sign_status||"unknown")}</td></tr>`).join("");$("empty").style.display=rows.length?"none":"block";$("visibleCount").textContent=`显示 ${rows.length} / ${items.length} 项`;$("findingsBody").querySelectorAll("tr").forEach(row=>{const pick=()=>{selectedId=row.dataset.id;renderTable();renderDetail()};row.addEventListener("click",pick);row.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" ")pick()})})}
    function fmtTime(value){if(!value)return"—";try{return new Date(value*1000).toLocaleString()}catch{return String(value)}}function fmtSize(n){if(!n)return"—";return n<1024?`${n} B`:n<1048576?`${(n/1024).toFixed(1)} KB`:`${(n/1048576).toFixed(1)} MB`}
    function renderDetail(){const item=items.find(x=>x.id===selectedId)||items[0];if(!item){$("detailContent").innerHTML="<p class='footer-note'>未发现自启动项目。</p>";return}const rules=(item.hits||[]).map(hit=>`<div class="rule ${hit.weight<0?"negative":"positive"}"><strong>${escapeHtml(hit.rule_id)}</strong><span>${escapeHtml(hit.title)}<small>${escapeHtml(hit.reason)}${hit.evidence?` · ${escapeHtml(hit.evidence)}`:""}</small></span><strong>${hit.weight>0?"+":""}${hit.weight}</strong></div>`).join("")||"<p class='footer-note'>未命中风险规则。</p>";const raw=JSON.stringify(item.raw||{},null,2);$("detailContent").innerHTML=`<div class="risk-hero"><div><h3>${escapeHtml(item.label||"(未命名)")}</h3><p>${escapeHtml(sourceNames[item.source]||item.source)} · ${escapeHtml(item.scope)}</p><p class="mono">${escapeHtml(item.program||item.config_path||"—")}</p></div><div class="risk-score" style="background:${item.level==="HIGH"?"linear-gradient(145deg,#7c1520,#d32d3e)":item.level==="MEDIUM"?"linear-gradient(145deg,#68420e,#bf7413)":"linear-gradient(145deg,#10502b,#208e4e)"}">${item.score}<small>${item.level}</small></div></div><section class="detail-section"><h4>证据信息</h4><dl class="kv"><dt>配置路径</dt><dd class="mono">${escapeHtml(item.config_path||"—")}</dd><dt>完整命令</dt><dd class="mono">${escapeHtml(item.command||"—")}</dd><dt>签名状态</dt><dd>${escapeHtml(item.sign_status)}${item.signer?` · ${escapeHtml(item.signer)}`:""}</dd><dt>SHA-256</dt><dd class="mono">${escapeHtml(item.file_hash||"—")}</dd><dt>属主 / 权限</dt><dd>${escapeHtml(item.owner||"—")} / ${escapeHtml(item.mode||"—")}</dd><dt>大小 / 修改</dt><dd>${fmtSize(item.size)} / ${fmtTime(item.mtime)}</dd><dt>驻留配置</dt><dd>RunAtLoad=${!!item.run_at_load}; KeepAlive=${!!item.keep_alive}</dd></dl></section><section class="detail-section"><h4>匹配规则（得分构成）</h4><div class="rules">${rules}</div></section><section class="detail-section"><h4>针对性建议</h4><ol class="advice">${(item.recommendations||[]).map(x=>`<li>${escapeHtml(x)}</li>`).join("")}</ol></section><section class="detail-section"><h4>解析字段</h4><pre class="raw mono">${escapeHtml(raw)}</pre></section>${item.parse_error?`<section class="errors"><strong>解析错误：</strong> ${escapeHtml(item.parse_error)}</section>`:""}<p class="footer-note">本工具仅提供只读风险证据，不会自动停用、修改或删除任何项目。</p>`}
    function download(name,type,text){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
    function csv(){const fields=["level","score","source","label","config_path","program","command","sign_status","file_hash","owner","mode","rules"],safe=v=>/^[=+\-@\t\r]/.test(String(v??""))?`'${v}`:v,quote=v=>`"${String(safe(v)??"").replaceAll('"','""')}"`;return [fields.join(","),...items.map(x=>fields.map(f=>quote(f==="rules"?(x.hits||[]).map(h=>h.rule_id).join(";"):x[f])).join(","))].join("\n")}
    ["search","levelFilter","sourceFilter","riskyOnly"].forEach(id=>$(id).addEventListener(id==="search"?"input":"change",renderTable));$("printBtn").onclick=()=>print();$("jsonBtn").onclick=()=>download("persistguard-report.json","application/json",JSON.stringify(data,null,2));$("csvBtn").onclick=()=>download("persistguard-report.csv","text/csv;charset=utf-8","\ufeff"+csv());$("openDetail").onclick=()=>$("detail").classList.add("open");$("closeDetail").onclick=()=>$("detail").classList.remove("open");
    const errors=data.errors||[];$("errorBox").style.display=errors.length?"block":"none";$("errorSummary").textContent=`扫描提示（${errors.length}）`;$("errors").innerHTML=errors.map(e=>`<p><strong>${escapeHtml(e.stage)}</strong> · <span class="mono">${escapeHtml(e.path)}</span><br>${escapeHtml(e.message)}</p>`).join("");renderTable();renderDetail();
  })();
  </script>
