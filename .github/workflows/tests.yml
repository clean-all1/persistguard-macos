name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        python: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package
        run: python -m pip install .
      - name: Run test suite
        run: python -m unittest discover -s tests -v
      - name: Fixture scan
        shell: bash
        run: |
          set +e
          python -m persistguard scan --root tests/fixtures/demo_root --home tests/fixtures/demo_root/Users/fixture --no-system-baseline --out reports/ci
          code=$?
          test "$code" -eq 2
