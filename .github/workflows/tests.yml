name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install package
        run: python -m pip install .
      - name: Run test suite
        run: python -m unittest discover -s tests -v
      - name: Fixture scan
        shell: bash
        run: |
          set +e
          python -m persistguard scan --root tests/fixtures/demo_root --home tests/fixtures/demo_root/Users/fixture --no-system-baseline --out reports/ci
          code=$?
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            test "$code" -eq 2
          else
            test "$code" -eq 0
          fi
          test -s reports/ci/persistguard-report.html
          test -s reports/ci/persistguard-report.json
          test -s reports/ci/persistguard-report.csv
